<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signor Vale Admin</title>
  <link rel="stylesheet" href="/admin.css" />
  <script defer src="/admin.js"></script>
</head>
<body>
  <main class="page">
    <section class="card" id="loginCard">
      <h1>Admin Login</h1>
      <p class="muted">Manage portfolio projects and detail pages.</p>
      <form id="loginForm" class="stack">
        <label>
          Username
          <input id="loginUsername" name="username" required />
        </label>
        <label>
          Password
          <input id="loginPassword" name="password" type="password" required />
        </label>
        <button type="submit">Sign In</button>
      </form>
      <p id="loginError" class="error"></p>
    </section>

    <section class="card hidden" id="adminCard">
      <header class="toolbar">
        <h1>Projects</h1>
        <button id="logoutButton" class="secondary">Logout</button>
      </header>

      <form id="projectForm" class="grid">
        <input type="hidden" id="projectId" />

        <label>
          Title
          <input id="title" required maxlength="80" />
        </label>

        <label>
          Slug
          <input id="slug" required maxlength="90" placeholder="my-project-name" />
        </label>

        <label>
          Category
          <input id="category" required maxlength="30" />
        </label>

        <label>
          Type
          <select id="projectType">
            <option value="website">Website</option>
            <option value="app" selected>App</option>
            <option value="tool">Tool</option>
          </select>
        </label>

        <label>
          Status
          <select id="status">
            <option value="draft">Draft</option>
            <option value="published" selected>Published</option>
          </select>
        </label>

        <label>
          Year
          <input id="year" required type="number" min="1900" max="2100" />
        </label>

        <label>
          Icon (1-2 chars)
          <input id="icon" required maxlength="2" />
        </label>

        <label>
          Icon Theme
          <select id="iconTheme">
            <option value="invoice">Green</option>
            <option value="calendar">Orange</option>
            <option value="notes">Purple</option>
          </select>
        </label>

        <label>
          Order
          <input id="displayOrder" type="number" min="0" max="9999" required />
        </label>

        <label>
          Published At
          <input id="publishedAt" type="datetime-local" />
        </label>

        <label class="full">
          Thumbnail URL
          <input id="thumbnailUrl" type="url" placeholder="https://..." />
        </label>

        <label class="full">
          Demo URL
          <input id="demoUrl" type="url" placeholder="https://..." />
        </label>

        <label class="full">
          Repo URL
          <input id="repoUrl" type="url" placeholder="https://github.com/..." />
        </label>

        <label class="full">
          Download URL
          <input id="downloadUrl" type="url" placeholder="https://..." />
        </label>

        <label class="full">
          Tech Stack (comma separated)
          <input id="techStack" placeholder="React, Node.js, SQLite" />
        </label>

        <label class="full">
          Gallery URLs (comma or newline separated)
          <textarea id="gallery" rows="3" placeholder="https://...\nhttps://..."></textarea>
        </label>

        <label class="full">
          Card Description
          <textarea id="description" required maxlength="300" rows="3"></textarea>
        </label>

        <label class="full">
          Project Details
          <textarea id="details" required maxlength="5000" rows="6"></textarea>
        </label>

        <label class="inline full">
          <input id="featured" type="checkbox" />
          Featured (full width card)
        </label>

        <div class="actions full">
          <button type="submit" id="saveButton">Save Project</button>
          <button type="button" class="secondary" id="resetButton">Reset</button>
        </div>
      </form>

      <p id="adminError" class="error"></p>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Slug</th>
              <th>Type</th>
              <th>Status</th>
              <th>Year</th>
              <th>Order</th>
              <th>Featured</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="projectsTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
