<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Project | Signor Vale</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("signor_theme");
        if (theme === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="/styles.css?v=20260218f" />
  <link rel="stylesheet" href="/project.css?v=20260218f" />
  <script defer src="/theme.js?v=20260218f"></script>
  <script defer src="/project.js?v=20260218f"></script>
</head>
<body>
  <main class="project-page">
    <div class="project-shell">
      <div class="project-topbar">
        <a href="/" class="back-link">← Back to Home</a>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch theme" aria-pressed="false">
          <span class="theme-toggle-icon" aria-hidden="true">◐</span>
          <span id="themeToggleLabel">Light</span>
        </button>
      </div>

      <section id="projectLoading" class="project-card">
        <p class="project-muted">Loading project...</p>
      </section>

      <section id="projectNotFound" class="project-card hidden">
        <h1>Project not found</h1>
        <p class="project-muted">This project may be private, draft, or no longer available.</p>
      </section>

      <article id="projectDetail" class="project-card hidden">
        <header class="project-header">
          <div class="project-header-main">
            <p id="projectType" class="project-type"></p>
            <h1 id="projectTitle"></h1>
            <p id="projectDescription" class="project-description"></p>
            <p id="projectMetaLine" class="project-meta-line"></p>
          </div>
          <img id="projectThumbnail" class="project-thumbnail hidden" alt="Project thumbnail" />
        </header>

        <div id="projectActions" class="project-actions"></div>

        <section id="detailsSection" class="project-section hidden">
          <p id="projectDetails" class="project-details"></p>
        </section>

        <section id="techSection" class="project-section hidden">
          <p id="projectTechLine" class="project-tech-line"></p>
        </section>

        <section id="gallerySection" class="project-section hidden">
          <div id="projectGallery" class="project-gallery"></div>
        </section>
      </article>
    </div>
  </main>
</body>
</html>
